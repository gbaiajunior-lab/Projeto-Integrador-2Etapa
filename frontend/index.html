<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-body">
            <h3 class="text-center mb-3">TaskFlow</h3>
            <p class="text-center text-muted">Sistema de organização de tarefas</p>

            <div class="mb-3">
              <label class="form-label">E-mail</label>
              <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail">
            </div>

            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
            </div>

            <button class="btn btn-primary w-100" onclick="login()">Entrar</button>

            <div class="mt-3 text-center">
              <a href="register.html">Criar conta</a>
            </div>

            <div class="mt-3">
              <div id="msg" class="alert d-none"></div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

<script src="script.js"></script>
<script>
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const res = await fetch("../backend/login.php", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({email, senha})
  });

  const data = await res.json();
  showMsg(data.success, data.message);

  if (data.success) {
    window.location.href = "dashboard.html";
  }
}
</script>
</body>
</html>
