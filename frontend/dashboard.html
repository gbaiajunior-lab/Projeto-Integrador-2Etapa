<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">TaskFlow</a>
    <button class="btn btn-light" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="container mt-4">

  <div class="row">
    <div class="col-md-6">
      <h4>Minhas Tarefas</h4>
      <div id="minhasTarefas"></div>
    </div>

    <div class="col-md-6">
      <h4>Tarefas Compartilhadas Comigo</h4>
      <div id="tarefasCompartilhadas"></div>
    </div>
  </div>

  <hr class="my-4">

  <h4>Criar Nova Tarefa</h4>
  <div class="card shadow-sm">
    <div class="card-body">

      <div class="mb-2">
        <label class="form-label">Título</label>
        <input type="text" id="titulo" class="form-control">
      </div>

      <div class="mb-2">
        <label class="form-label">Descrição</label>
        <textarea id="descricao" class="form-control"></textarea>
      </div>

      <div class="mb-2">
        <label class="form-label">Data Prazo</label>
        <input type="date" id="data_prazo" class="form-control">
      </div>

      <button class="btn btn-success mt-2" onclick="criarTarefa()">Salvar</button>

      <div class="mt-3">
        <div id="msg" class="alert d-none"></div>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
async function carregarTarefas() {
  const res = await fetch("../backend/list_tasks.php");
  const data = await res.json();

  if (!data.success) {
    alert("Sessão expirada. Faça login novamente.");
    window.location.href = "index.html";
    return;
  }

  const minhas = data.data.minhas;
  const compartilhadas = data.data.compartilhadas;

  document.getElementById("minhasTarefas").innerHTML = renderTasks(minhas, true);
  document.getElementById("tarefasCompartilhadas").innerHTML = renderSharedTasks(compartilhadas);
}

function renderTasks(tasks, allowActions) {
  if (!tasks || tasks.length === 0) {
    return "<p class='text-muted'>Nenhuma tarefa cadastrada.</p>";
  }

  let html = "<ul class='list-group'>";
  tasks.forEach(t => {
    html += `
      <li class="list-group-item">
        <b>${t.titulo}</b><br>
        <small>${t.descricao ?? ""}</small><br>
        <small><b>Prazo:</b> ${t.data_prazo ?? "-"}</small><br>
        <small><b>Status:</b> ${t.status}</small><br>

        <div class="mt-2 d-flex gap-2">
          <button class="btn btn-sm btn-warning" onclick="editarTarefa(${t.id}, '${escapeQuotes(t.titulo)}', '${escapeQuotes(t.descricao ?? "")}', '${t.data_prazo ?? ""}', '${t.status}')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="excluirTarefa(${t.id})">Excluir</button>
          <button class="btn btn-sm btn-info text-white" onclick="compartilhar(${t.id})">Compartilhar</button>
        </div>
      </li>
    `;
  });
  html += "</ul>";
  return html;
}

function renderSharedTasks(tasks) {
  if (!tasks || tasks.length === 0) {
    return "<p class='text-muted'>Nenhuma tarefa compartilhada.</p>";
  }

  let html = "<ul class='list-group'>";
  tasks.forEach(t => {
    html += `
      <li class="list-group-item">
        <b>${t.titulo}</b><br>
        <small>${t.descricao ?? ""}</small><br>
        <small><b>Prazo:</b> ${t.data_prazo ?? "-"}</small><br>
        <small><b>Status:</b> ${t.status}</small><br>
        <small class="text-muted"><b>Dono:</b> ${t.dono_nome} (${t.dono_email})</small>
      </li>
    `;
  });
  html += "</ul>";
  return html;
}

async function criarTarefa() {
  const titulo = document.getElementById("titulo").value;
  const descricao = document.getElementById("descricao").value;
  const data_prazo = document.getElementById("data_prazo").value;

  const res = await fetch("../backend/create_task.php", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({titulo, descricao, data_prazo})
  });

  const data = await res.json();
  showMsg(data.success, data.message);

  if (data.success) {
    document.getElementById("titulo").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("data_prazo").value = "";
    carregarTarefas();
  }
}

async function excluirTarefa(id) {
  if (!confirm("Deseja excluir essa tarefa?")) return;

  const res = await fetch("../backend/delete_task.php", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id})
  });

  const data = await res.json();
  alert(data.message);
  carregarTarefas();
}

async function editarTarefa(id, titulo, descricao, data_prazo, status) {
  const novoTitulo = prompt("Novo título:", titulo);
  if (novoTitulo === null) return;

  const novaDescricao = prompt("Nova descrição:", descricao);
  if (novaDescricao === null) return;

  const novoPrazo = prompt("Nova data prazo (AAAA-MM-DD):", data_prazo);
  if (novoPrazo === null) return;

  const novoStatus = prompt("Status (PENDENTE / EM_ANDAMENTO / CONCLUIDA):", status);
  if (novoStatus === null) return;

  const res = await fetch("../backend/update_task.php", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      id,
      titulo: novoTitulo,
      descricao: novaDescricao,
      data_prazo: novoPrazo,
      status: novoStatus
    })
  });

  const data = await res.json();
  alert(data.message);
  carregarTarefas();
}

async function compartilhar(id_tarefa) {
  const email_destino = prompt("Digite o e-mail do usuário que vai receber a tarefa:");
  if (!email_destino) return;

  const res = await fetch("../backend/share_task.php", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id_tarefa, email_destino})
  });

  const data = await res.json();
  alert(data.message);
}

async function logout() {
  await fetch("../backend/logout.php");
  window.location.href = "index.html";
}

carregarTarefas();
</script>
</body>
</html>
